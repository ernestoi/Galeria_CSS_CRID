<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<link rel="stylesheet" href="styles.css">
    <title>Crads - Products</title>
</head>
<body>
    <h1>By Isaias</h1>
    <div class="global-container">
        <main class="cards-container">
                <div class="card">
                    <div class="img-content">
                        <img src="assets/img/image-equilibrium.jpg" alt="Imagen">
                    </div>
                    <div class="info-content">
                        <h3>Equilibrium #3429</h3>
                        <p>Our Equibrium collection promotes balance and calm.</p>
                        <div class="date-content">
                            <div class="crypto">
                                <span>
                                    <i class="fa-brands fa-ethereum"></i> 0.041 ETH
                                </span>
                            </div>
                            <div class="day">
                                <span><i class="fa-solid fa-clock"></i> 3 days left</span>
                            </div>
                        </div>
                    </div>
                    <div class="user-content">
                        <img src="assets/img/user.jpg" alt="">
                        <span class="autor">Creation of <span class="name">Jules Wyvern</span></span>
                    </div>
                </div>
        </main>
    </div>
</body>
</html>
